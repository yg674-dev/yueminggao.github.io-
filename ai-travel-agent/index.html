<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripOptimizer AI – AI Travel Itinerary Builder</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#030213',
            'primary-fg': '#ffffff',
            card: '#ffffff',
            border: 'rgba(0,0,0,0.1)',
            muted: '#ececf0',
            'muted-fg': '#717182',
            accent: '#e9ebef',
            input: '#f3f3f5',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; }
    .step-bar { height: 8px; border-radius: 9999px; transition: background 0.3s; }
    .card-hover:hover { box-shadow: 0 10px 40px rgba(0,0,0,0.12); transform: translateY(-2px); transition: all 0.2s; }
    .btn-primary { background: #030213; color: #fff; padding: 14px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-secondary { background: #ececf0; color: #030213; padding: 14px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-secondary:hover { background: #e9ebef; }
    .option-btn { padding: 14px 16px; border-radius: 10px; border: 2px solid rgba(0,0,0,0.1); background: white; text-align: left; cursor: pointer; font-size: 15px; transition: border-color 0.2s, background 0.2s; }
    .option-btn:hover { border-color: rgba(3,2,19,0.4); }
    .option-btn.selected { border-color: #030213; background: rgba(3,2,19,0.06); }
    input[type=text], input[type=number], input[type=date] {
      width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.12);
      background: #f3f3f5; font-size: 15px; outline: none; transition: box-shadow 0.2s;
    }
    input:focus { box-shadow: 0 0 0 3px rgba(3,2,19,0.15); }
    .badge-best { background: #030213; color: white; padding: 4px 12px; border-radius: 9999px; font-size: 13px; font-weight: 500; display: inline-block; margin-bottom: 12px; }
    .gradient-header { background: linear-gradient(135deg, #030213 0%, #1a1a3e 100%); color: white; border-radius: 18px; padding: 36px; margin-bottom: 32px; }
    .day-circle { background: #030213; color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
    .activity-row { display: flex; align-items: center; gap: 12px; }
    .activity-pill { display: flex; align-items: center; gap: 10px; flex: 1; background: rgba(236,236,240,0.5); border-radius: 10px; padding: 12px 14px; }
    .star-fill { color: #facc15; fill: #facc15; }
    /* OpenTable panel */
    .ot-red { color: #da3743; }
    .ot-bg { background: #da3743; }
    .ot-btn { background: #da3743; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .ot-btn:hover { opacity: 0.85; }
    .ot-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ot-btn-outline { background: white; color: #da3743; border: 1.5px solid #da3743; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .ot-btn-outline:hover { background: #da3743; color: white; }
    .slot-btn { background: #da3743; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; margin: 3px; transition: opacity 0.2s; }
    .slot-btn:hover { opacity: 0.85; }
    .tab-btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
    .tab-btn.active { background: #030213; color: white; }
    .tab-btn:not(.active) { background: transparent; color: #717182; }
    .tab-btn:not(.active):hover { background: #ececf0; }
    /* Yelp panel */
    .yelp-red { color: #d32323; }
    .yelp-border { border-color: #d32323; }
    .yelp-bg { background: #d32323; }
    .business-card { background: white; border-radius: 14px; border: 1px solid rgba(0,0,0,0.1); padding: 16px; transition: box-shadow 0.2s; }
    .business-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .reserve-btn { background: #d32323; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .reserve-btn:hover { opacity: 0.85; }
    .reserve-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .chat-bubble-ai { background: #f3f3f5; border-radius: 12px 12px 12px 2px; padding: 12px 16px; max-width: 85%; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .chat-bubble-user { background: #030213; color: white; border-radius: 12px 12px 2px 12px; padding: 10px 14px; max-width: 75%; font-size: 14px; align-self: flex-end; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .backend-banner { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 12px; padding: 14px 18px; font-size: 14px; color: #92400e; margin-bottom: 20px; }
    .save-tag { color: #16a34a; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── SVG Icons ─────────────────────────────────────────── */
const Icon = {
  Sparkles: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>,
  MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>,
  Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>,
  Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
  PlaneTakeoff: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22h20"/><path d="M6.36 17.4 4 17l-2-4 1.1-.55a2 2 0 0 1 1.8 0l.17.1a2 2 0 0 0 1.8 0L8 12 5 6l.9-.45a2 2 0 0 1 2.09.2l4.02 3a2 2 0 0 0 2.1.2l4.19-2.06a2.41 2.41 0 0 1 1.73-.17L21 7a1.4 1.4 0 0 1 .87 1.99l-.38.76c-.23.46-.6.84-1.07 1.08L7.58 17.2a2 2 0 0 1-1.22.18z"/></svg>,
  ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
  Star: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="star-fill"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  Plane: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19 2c-2-2-4-2-5.5-.5L10 5 1.8 6.2a.5.5 0 0 0-.3.8L4 10l-1 2.5L1 14l4 4 1.5-2 2.5-1 3.5 2.5.8-.2"/></svg>,
  Hotel: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="m9 22 .01-4"/><path d="m15 22 .01-4"/><path d="M9 7h1"/><path d="M9 11h1"/><path d="M9 15h1"/><path d="M15 7h1"/><path d="M15 11h1"/><path d="M15 15h1"/></svg>,
  Car: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17H5v-3.5l2-5h10l2 5V17z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/></svg>,
  Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
  Dollar: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
  Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  Coffee: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#030213" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>,
  Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#030213" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
  Utensils: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#030213" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>,
};

/* ── SearchForm ─────────────────────────────────────────── */
function SearchForm({ onSearch }) {
  const [origin, setOrigin] = useState('Los Angeles');
  const [destination, setDestination] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [travelers, setTravelers] = useState(2);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (destination && startDate && endDate) onSearch({ origin, destination, startDate, endDate, travelers });
  };

  return (
    <form onSubmit={handleSubmit} className="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <h2 className="text-xl font-semibold mb-6 text-gray-900">Find Your Perfect Trip</h2>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
        <div className="space-y-2">
          <label className="flex items-center gap-2 text-sm font-medium text-gray-500">
            <Icon.PlaneTakeoff /> Flying from
          </label>
          <input type="text" value={origin} onChange={e => setOrigin(e.target.value)}
            placeholder="City or airport code" required />
        </div>
        <div className="space-y-2">
          <label className="flex items-center gap-2 text-sm font-medium text-gray-500">
            <Icon.MapPin /> Destination
          </label>
          <input type="text" value={destination} onChange={e => setDestination(e.target.value)}
            placeholder="Where do you want to go?" required />
        </div>
        <div className="space-y-2">
          <label className="flex items-center gap-2 text-sm font-medium text-gray-500">
            <Icon.Calendar /> Start Date
          </label>
          <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} required />
        </div>
        <div className="space-y-2">
          <label className="flex items-center gap-2 text-sm font-medium text-gray-500">
            <Icon.Calendar /> End Date
          </label>
          <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} required />
        </div>
        <div className="space-y-2 md:col-span-2">
          <label className="flex items-center gap-2 text-sm font-medium text-gray-500">
            <Icon.Users /> Travelers
          </label>
          <input type="number" value={travelers} onChange={e => setTravelers(Number(e.target.value))} min="1" max="20" required />
        </div>
      </div>
      <button type="submit" className="btn-primary">
        <Icon.Search /> Search Real Deals
      </button>
    </form>
  );
}

/* ── PriceComparison ────────────────────────────────────── */
function PriceComparison({ packages, packageSource, onSelectPackage }) {
  const isReal = packageSource === 'real';
  return (
    <div className="w-full max-w-6xl">
      <div className="flex items-center justify-between mb-2 flex-wrap gap-3">
        <h2 className="text-2xl font-semibold text-gray-900">
          {isReal ? 'Live Deals from Booking.com & Kayak' : 'Compare Prices from Top Providers'}
        </h2>
        {isReal && (
          <div className="flex items-center gap-2 text-xs text-gray-400 bg-gray-50 border border-gray-100 rounded-full px-3 py-1.5">
            <span className="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
            Live data · Hotels from Booking.com · Flights from Kayak
          </div>
        )}
      </div>
      <p className="text-gray-500 mb-8">
        {isReal ? 'Real hotel + flight prices — pick the package that fits your budget' : 'Pick the package that fits your style and budget'}
      </p>
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        {packages.map(pkg => (
          <div key={pkg.id} className={`card-hover bg-white rounded-2xl border-2 flex flex-col overflow-hidden ${pkg.bestDeal ? 'border-gray-900' : 'border-gray-100'}`}>
            {/* Hotel image (real data only) */}
            {pkg.hotelImg && (
              <div className="relative">
                <img src={pkg.hotelImg} alt={pkg.hotelName || ''} className="w-full h-40 object-cover" />
                {pkg.bestDeal && <span className="badge-best absolute top-3 left-3">✦ Best Deal</span>}
              </div>
            )}
            <div className="p-5 flex flex-col flex-1">
              {!pkg.hotelImg && pkg.bestDeal && <span className="badge-best mb-3">✦ Best Deal</span>}

              {/* Hotel name (real) or provider (mock) */}
              {pkg.hotelName ? (
                <div className="mb-3">
                  <a href={pkg.hotelLink} target="_blank" rel="noopener noreferrer"
                    className="text-base font-semibold text-gray-900 hover:underline leading-tight line-clamp-2">
                    {pkg.hotelName}
                  </a>
                  {pkg.hotelLocation && <p className="text-xs text-gray-400 mt-0.5 line-clamp-1">{pkg.hotelLocation}</p>}
                </div>
              ) : (
                <h3 className="text-lg font-semibold text-gray-900 mb-3">{pkg.provider}</h3>
              )}

              {/* Rating */}
              <div className="flex items-center gap-1 text-sm text-gray-600 mb-3">
                {pkg.hotelScore ? (
                  <>
                    <span className="bg-gray-900 text-white text-xs font-bold px-1.5 py-0.5 rounded">{pkg.hotelScore}</span>
                    <span className="text-gray-400 text-xs">({(pkg.reviews || 0).toLocaleString()} reviews)</span>
                  </>
                ) : (
                  <><Icon.Star /> {pkg.rating} <span className="text-gray-400 ml-1">({(pkg.reviews || 0).toLocaleString()})</span></>
                )}
              </div>

              {/* Price */}
              <div className="mb-3">
                <div className="flex items-baseline gap-2">
                  <span className="text-3xl font-bold text-gray-900">${pkg.totalPrice.toLocaleString()}</span>
                  <span className="text-gray-400 text-sm">total</span>
                </div>
                {pkg.savings > 0 && <p className="save-tag mt-1">You save ~${pkg.savings.toLocaleString()}</p>}
              </div>

              {/* Price breakdown */}
              <div className="space-y-2 mb-4 text-sm text-gray-600">
                <div className="flex justify-between">
                  <span className="flex items-center gap-2"><Icon.Plane />
                    {pkg.airline ? `${pkg.airline}` : 'Flight'}
                    {pkg.flightDuration && <span className="text-gray-400 text-xs">· {pkg.flightDuration}</span>}
                  </span>
                  <span className="font-medium">${pkg.flightPrice.toLocaleString()}</span>
                </div>
                <div className="flex justify-between">
                  <span className="flex items-center gap-2"><Icon.Hotel /> Hotel</span>
                  <span className="font-medium">${pkg.hotelPrice.toLocaleString()}</span>
                </div>
                {pkg.carRentalPrice && (
                  <div className="flex justify-between">
                    <span className="flex items-center gap-2"><Icon.Car /> Car Rental</span>
                    <span className="font-medium">${pkg.carRentalPrice.toLocaleString()}</span>
                  </div>
                )}
              </div>

              {/* Features */}
              <ul className="space-y-1.5 mb-5 flex-1">
                {pkg.features.map((f, i) => (
                  <li key={i} className="flex items-start gap-2 text-sm text-gray-700">
                    <span className="mt-0.5 flex-shrink-0"><Icon.Check /></span> {f}
                  </li>
                ))}
              </ul>

              <button onClick={() => onSelectPackage(pkg)}
                className={`w-full py-3 rounded-xl font-medium transition-all ${pkg.bestDeal ? 'btn-primary' : 'btn-secondary'}`}>
                Select Package
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── TripQuestionnaire ──────────────────────────────────── */
const questions = [
  { id: 'accommodation', question: 'What type of accommodation do you prefer?', options: ['Luxury Hotel','Boutique Hotel','Budget Hotel','Vacation Rental','Hostel'] },
  { id: 'activities', question: 'What activities interest you? (Select all that apply)', options: ['Sightseeing','Adventure Sports','Beach & Relaxation','Museums & Culture','Shopping','Nightlife','Food Tours','Nature & Hiking'], multiple: true },
  { id: 'pace', question: 'What pace do you prefer for your trip?', options: ['Relaxed – lots of downtime','Moderate – balanced schedule','Packed – maximize experiences'] },
  { id: 'budget', question: "What's your budget per person per day (excluding flights)?", options: ['Under $100','$100–$200','$200–$400','$400+'] },
  { id: 'dining', question: "What's your dining preference?", options: ['Street Food & Local Eats','Mix of Casual & Fine Dining','Fine Dining & Upscale','Self-Catering'] },
];

function TripQuestionnaire({ onComplete }) {
  const [current, setCurrent] = useState(0);
  const [prefs, setPrefs] = useState({ activities: [] });
  const q = questions[current];

  const handleSelect = (opt) => {
    if (q.multiple) {
      const arr = prefs.activities || [];
      setPrefs({ ...prefs, activities: arr.includes(opt) ? arr.filter(a => a !== opt) : [...arr, opt] });
    } else {
      setPrefs({ ...prefs, [q.id]: opt });
    }
  };

  const canProceed = q.multiple ? (prefs.activities?.length > 0) : !!prefs[q.id];

  const handleNext = () => {
    if (current < questions.length - 1) setCurrent(current + 1);
    else onComplete(prefs);
  };

  return (
    <div className="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <div className="mb-6">
        <div className="flex gap-1.5 mb-3">
          {questions.map((_, i) => (
            <div key={i} className="step-bar flex-1" style={{ background: i <= current ? '#030213' : '#ececf0' }} />
          ))}
        </div>
        <p className="text-sm text-gray-400">Question {current + 1} of {questions.length}</p>
      </div>
      <h2 className="text-xl font-semibold mb-6 text-gray-900">{q.question}</h2>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
        {q.options.map(opt => {
          const sel = q.multiple ? prefs.activities?.includes(opt) : prefs[q.id] === opt;
          return (
            <button key={opt} onClick={() => handleSelect(opt)}
              className={`option-btn ${sel ? 'selected' : ''}`}>
              {sel && <span className="mr-2">✓</span>}{opt}
            </button>
          );
        })}
      </div>
      <button onClick={handleNext} disabled={!canProceed} className="btn-primary">
        {current < questions.length - 1 ? 'Next Question' : '✦ Generate My Itinerary'} <Icon.ChevronRight />
      </button>
    </div>
  );
}

/* ── Yelp helpers ───────────────────────────────────────── */
const PROXY = 'http://localhost:3001';

async function yelpChat(query, chatId, lat, lng) {
  const body = { query };
  if (chatId) body.chat_id = chatId;
  if (lat != null && lng != null) { body.latitude = lat; body.longitude = lng; }
  const r = await fetch(`${PROXY}/api/yelp/chat`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error((await r.json()).error || r.statusText);
  return r.json();
}

function parseBusinesses(data) {
  for (const entity of (data.entities || [])) {
    if (entity.businesses?.length) return entity.businesses;
  }
  return [];
}

}

function OpenTablePanel({ destination, travelers, startDate }) {
  const [restaurants, setRestaurants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(null);       // restaurant for availability check
  const [availability, setAvailability] = useState(null);
  const [avLoading, setAvLoading] = useState(false);
  const [date, setDate] = useState(startDate || '');
  const [time, setTime] = useState('19:00');
  const [party, setParty] = useState(travelers || 2);
  const [error, setError] = useState('');

  const search = async (q) => {
    const searchQuery = q || query || 'restaurants';
    setLoading(true); setError(''); setRestaurants([]); setSelected(null); setAvailability(null);
    try {
      const res = await fetch(`${PROXY}/api/opentable/search`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: searchQuery, location: destination, date, time, partySize: party }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Search failed');
      setRestaurants(json.results || []);
      if (!json.results?.length) setError('No restaurants found. Try a different search.');
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const checkAvailability = async (restaurant) => {
    setSelected(restaurant); setAvailability(null); setAvLoading(true); setError('');
    try {
      const res = await fetch(`${PROXY}/api/opentable/availability`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ restaurantUrl: restaurant.url, date, time, partySize: party }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Availability check failed');
      setAvailability(json);
    } catch (e) { setError(e.message); setAvailability(null); }
    finally { setAvLoading(false); }
  };

  // Auto-search on mount
  React.useEffect(() => { search('restaurants'); }, []);

  return (
    <div>
      {/* Search bar */}
      <form onSubmit={e => { e.preventDefault(); search(); }} className="flex gap-2 mb-4">
        <input type="text" value={query} onChange={e => setQuery(e.target.value)}
          placeholder={`Search restaurants in ${destination}…`}
          className="flex-1 text-sm" />
        <button type="submit" disabled={loading} className="ot-btn px-4 flex-shrink-0">
          {loading ? '…' : 'Search'}
        </button>
      </form>

      {/* Date / time / party controls */}
      <div className="flex flex-wrap gap-3 mb-5 text-sm">
        <div className="flex items-center gap-2">
          <label className="text-gray-400 text-xs">Date</label>
          <input type="date" value={date} onChange={e => setDate(e.target.value)} className="text-sm py-1.5 px-2" style={{width:'140px'}} />
        </div>
        <div className="flex items-center gap-2">
          <label className="text-gray-400 text-xs">Time</label>
          <input type="time" value={time} onChange={e => setTime(e.target.value)} className="text-sm py-1.5 px-2" style={{width:'110px'}} />
        </div>
        <div className="flex items-center gap-2">
          <label className="text-gray-400 text-xs">Party</label>
          <input type="number" min="1" max="20" value={party} onChange={e => setParty(+e.target.value)} className="text-sm py-1.5 px-2" style={{width:'70px'}} />
        </div>
      </div>

      {error && <p className="text-red-500 text-sm mb-3">{error}</p>}

      {/* Restaurant list */}
      {restaurants.length > 0 && (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
          {restaurants.map((r, i) => (
            <div key={i} className="business-card">
              {r.imageUrl && <img src={r.imageUrl} alt={r.name} className="w-full h-32 object-cover rounded-lg mb-3" />}

                    {[1,2,3,4,5].map(s => (

      {loading && restaurants.length === 0 && (
        <div className="flex items-center gap-3 text-sm text-gray-400 py-4">

function YelpPanel({ destination }) {
  const [backendOk, setBackendOk] = useState(null); // null=checking, true/false
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [chatId, setChatId] = useState(null);
  const [businesses, setBusinesses] = useState([]);
  const [loading, setLoading] = useState(false);
  const [reservingBiz, setReservingBiz] = useState(null);
  const messagesEndRef = React.useRef(null);

  // Check backend health on mount
  React.useEffect(() => {
    fetch(`${PROXY}/api/health`)
      .then(r => r.json())
      .then(d => setBackendOk(d.ok))
      .catch(() => setBackendOk(false));
  }, []);

  React.useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  // Auto-search on first load once backend confirmed
  React.useEffect(() => {
    if (backendOk && messages.length === 0 && destination) {
      sendQuery(`Find the best restaurants in ${destination}`);
    }
  }, [backendOk]);

  const sendQuery = async (q) => {
    const query = q || input.trim();
    if (!query) return;
    setInput('');
    setMessages(m => [...m, { role: 'user', text: query }]);
    setLoading(true);
    try {
      const data = await yelpChat(query, chatId);
      const text = data.response?.text || '';
      const bizList = parseBusinesses(data);
      setChatId(data.chat_id);
      setMessages(m => [...m, { role: 'ai', text }]);
      if (bizList.length) setBusinesses(bizList);
    } catch (e) {
      setMessages(m => [...m, { role: 'ai', text: `⚠ ${e.message}` }]);
    } finally {
      setLoading(false);
    }
  };

  if (backendOk === null) {
    return <div className="text-sm text-gray-400 py-4 text-center">Connecting to Yelp backend…</div>;
  }

  if (!backendOk) {
    return (
      <div className="backend-banner">
        <p className="font-semibold mb-1">🔌 Yelp backend not running</p>
        <p className="mb-2">Start the local proxy to enable restaurant discovery and reservations:</p>
        <code className="block bg-orange-50 border border-orange-200 rounded px-3 py-2 text-xs font-mono">
          cd ai-travel-agent &amp;&amp; cp .env.example .env &amp;&amp; npm install &amp;&amp; npm start
        </code>
        <p className="mt-2 text-xs">Then add your <strong>YELP_API_KEY</strong> to <code>.env</code> and refresh.</p>
      </div>
    );
  }

  return (
    <div>
      {/* Business grid */}
      {businesses.length > 0 && (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
          {businesses.map((biz, i) => (
            <BusinessCard key={biz.id || i} biz={biz} onReserve={setReservingBiz} />
          ))}
        </div>
      )}

      {/* Chat thread */}
      {messages.length > 0 && (
        <div className="flex flex-col gap-3 mb-4 max-h-64 overflow-y-auto pr-1">
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div className={m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'}>
                {m.text}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex justify-start">
              <div className="chat-bubble-ai text-gray-400">Yelp is thinking…</div>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>
      )}

      {/* Input */}
      <form onSubmit={e => { e.preventDefault(); sendQuery(); }} className="flex gap-2">
        <input type="text" value={input} onChange={e => setInput(e.target.value)}
          placeholder={`Ask Yelp anything — "best sushi near ${destination}", "romantic dinner spot", "book a table for 2"…`}
          className="flex-1 text-sm" disabled={loading} />
        <button type="submit" disabled={loading || !input.trim()} className="reserve-btn px-5 flex-shrink-0">
          {loading ? '…' : 'Ask'}
        </button>
      </form>

      {reservingBiz && (
        <ReservationModal
          biz={reservingBiz}
          destination={destination}
          chatId={chatId}
          setChatId={setChatId}
          onClose={() => setReservingBiz(null)}
        />
      )}
    </div>
  );
}

/* ── App ────────────────────────────────────────────────── */
function App() {
  const [step, setStep] = useState('search');
  const [searchData, setSearchData] = useState(null);
  const [selectedPackage, setSelectedPackage] = useState(null);
  const [preferences, setPreferences] = useState(null);
  const [packages, setPackages] = useState([]);
  const [loadingPackages, setLoadingPackages] = useState(false);
  const [packageSource, setPackageSource] = useState('mock'); // 'real' | 'mock'

  const mockPackages = (data) => {
    const fp = 450, nights = Math.max(1,Math.ceil((new Date(data.endDate)-new Date(data.startDate))/86400000)), hp = 120*nights, t = data.travelers;
    return [
      { id:'1', provider:'TravelBuddy', totalPrice:(fp+hp+200)*t, flightPrice:fp*t, hotelPrice:hp*t, carRentalPrice:200*t, rating:4.8, reviews:1243, features:['Free cancellation up to 48h','24/7 customer support','Airport transfers included','Complimentary breakfast'], savings:250, bestDeal:true },
      { id:'2', provider:'SkyExplorer', totalPrice:(fp*1.15+hp*0.9+180)*t, flightPrice:fp*1.15*t, hotelPrice:hp*0.9*t, carRentalPrice:180*t, rating:4.6, reviews:892, features:['Flexible date changes','Travel insurance included','Priority check-in','Free WiFi'], savings:150 },
      { id:'3', provider:'GlobalGetaways', totalPrice:(fp*1.2+hp*1.1)*t, flightPrice:fp*1.2*t, hotelPrice:hp*1.1*t, rating:4.5, reviews:2156, features:['Luxury hotel upgrades','Concierge service','Welcome gift','Late checkout'] },
      { id:'4', provider:'WanderWise', totalPrice:(fp*0.95+hp*1.05+150)*t, flightPrice:fp*0.95*t, hotelPrice:hp*1.05*t, carRentalPrice:150*t, rating:4.7, reviews:1567, features:['Price match guarantee','Rewards points 2×','Travel guide included','$50 room service credit'], savings:180 },
      { id:'5', provider:'VoyageVista', totalPrice:(fp*1.1+hp*0.85+220)*t, flightPrice:fp*1.1*t, hotelPrice:hp*0.85*t, carRentalPrice:220*t, rating:4.4, reviews:734, features:['Eco-friendly hotels','Carbon offset included','Local experience tours','Mobile app support'], savings:120 },
      { id:'6', provider:'JetSetters', totalPrice:(fp*1.25+hp*1.15)*t, flightPrice:fp*1.25*t, hotelPrice:hp*1.15*t, rating:4.9, reviews:3421, features:['Premium economy flights','5-star hotels only','Private transfers','Spa access included'] },
    ];
  };

  const fetchPackages = async (data) => {
    setLoadingPackages(true);
    try {
      const res = await fetch(`${PROXY}/api/packages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const json = await res.json();
      if (!json.fallback && json.packages?.length) {
        setPackages(json.packages);
        setPackageSource('real');
      } else {
        setPackages(mockPackages(data));
        setPackageSource('mock');
      }
    } catch {
      setPackages(mockPackages(data));
      setPackageSource('mock');
    } finally {
      setLoadingPackages(false);
    }
  };

  const reset = () => { setStep('search'); setSearchData(null); setSelectedPackage(null); setPreferences(null); setPackages([]); setPackageSource('mock'); };

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="sticky top-0 z-10 bg-white/90 backdrop-blur border-b border-gray-100">
        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-gray-900 text-white rounded-xl flex items-center justify-center">
              <Icon.Sparkles />
            </div>
            <div>
              <p className="font-semibold text-gray-900 leading-tight">TripOptimizer AI</p>
              <p className="text-xs text-gray-400">Smart Travel Planning</p>
            </div>
          </div>
          {step !== 'search' && (
            <button onClick={reset} className="text-sm text-gray-400 hover:text-gray-800 transition-colors">
              ← New Search
            </button>
          )}
        </div>
        {/* Progress indicator */}
        <div className="max-w-6xl mx-auto px-6 pb-3 flex items-center gap-2 text-xs text-gray-400">
          {['search','compare','questionnaire','itinerary'].map((s, i) => (
            <React.Fragment key={s}>
              <span className={step === s ? 'text-gray-900 font-medium' : ''}>
                {['Search','Compare','Preferences','Itinerary'][i]}
              </span>
              {i < 3 && <span className="text-gray-200">›</span>}
            </React.Fragment>
          ))}
        </div>
      </header>

      {/* Main */}
      <main className="max-w-6xl mx-auto px-6 py-12 flex flex-col items-center">
        {step === 'search' && (
          <div className="w-full flex flex-col items-center">
            <div className="text-center mb-10">
              <h1 className="text-5xl font-semibold text-gray-900 mb-4 tracking-tight">Plan Your Perfect Trip</h1>
              <p className="text-lg text-gray-500 max-w-xl">
                Compare prices from Booking.com &amp; Kayak, personalise your preferences, and get a day-by-day itinerary instantly.
              </p>
            </div>
            <SearchForm onSearch={d => { setSearchData(d); setStep('compare'); fetchPackages(d); }} />
          </div>
        )}

        {step === 'compare' && searchData && (
          loadingPackages ? (
            <div className="flex flex-col items-center gap-4 py-20">
              <div className="w-12 h-12 rounded-full border-4 border-gray-200 border-t-gray-900 animate-spin" />
              <p className="text-gray-500">Searching Booking.com &amp; Kayak for real deals…</p>
              <p className="text-xs text-gray-300">This takes ~15–20 seconds</p>
            </div>
          ) : (
            <PriceComparison
              packages={packages}
              packageSource={packageSource}
              onSelectPackage={p => { setSelectedPackage(p); setStep('questionnaire'); }}
            />
          )
        )}

        {step === 'questionnaire' && (
          <div className="w-full flex flex-col items-center">
            <div className="text-center mb-8">
              <h1 className="text-4xl font-semibold text-gray-900 mb-3">Personalise Your Trip</h1>
              <p className="text-gray-500">A few quick questions so we can tailor the perfect itinerary for you</p>
            </div>
            <TripQuestionnaire onComplete={p => { setPreferences(p); setStep('itinerary'); }} />
          </div>
        )}

        {step === 'itinerary' && searchData && selectedPackage && preferences && (
          <ItineraryDisplay searchData={searchData} selectedPackage={selectedPackage} preferences={preferences} onStartOver={reset} />
        )}
      </main>

      {/* Footer */}
      <footer className="border-t border-gray-100 mt-20 py-8">
        <div className="max-w-6xl mx-auto px-6 text-center text-sm text-gray-400">
          © 2026 TripOptimizer AI · AI Travel Itinerary Builder MVP
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
